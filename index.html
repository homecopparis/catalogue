<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Home Cop Paris — Catalogue</title>
<meta name="description" content="Catalogue Home Cop Paris — 24 marques, 717 articles. Streetwear & luxe.">
<meta property="og:title" content="Home Cop Paris — Catalogue">
<meta property="og:description" content="24 marques, 717 articles. Streetwear & luxe.">
<meta property="og:type" content="website">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --green-deep:#003d1f;
  --green-dark:#005a29;
  --green-mid:#007f3f;
  --green-accent:#00a74a;
  --green-light:#00c853;
  --green-glow:rgba(0,200,83,.12);
  --bg:#070a07;
  --bg-card:#0f1510;
  --bg-card-hover:#141e14;
  --bg-header:rgba(7,10,7,.88);
  --border:rgba(0,90,41,.10);
  --border-hover:rgba(0,127,63,.35);
  --text:#f2f2f0;
  --text-dim:rgba(242,242,240,.55);
  --text-muted:rgba(242,242,240,.30);
  --radius:12px;
  --font-display:'Playfair Display',Georgia,serif;
  --font-body:'Inter',system-ui,-apple-system,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden}

/* ── HEADER ── */
.header{
  position:fixed;top:0;left:0;right:0;z-index:100;
  background:var(--bg-header);backdrop-filter:blur(24px) saturate(1.4);
  border-bottom:1px solid var(--border);
  transition:transform .3s ease;
}
.header-inner{
  max-width:1440px;margin:0 auto;
  padding:0 32px;height:64px;
  display:flex;align-items:center;gap:24px;
}
.logo-wrap{display:flex;align-items:center;gap:12px;text-decoration:none;cursor:pointer;flex-shrink:0}
.logo-img{width:38px;height:38px;border-radius:10px;object-fit:cover}
.logo-text{font-family:var(--font-display);font-size:18px;font-weight:700;color:#fff;letter-spacing:.3px}
.logo-text span{color:var(--green-accent)}

.search-box{
  flex:1;max-width:420px;position:relative;margin:0 auto;
}
.search-input{
  width:100%;padding:10px 16px 10px 42px;
  border-radius:40px;border:1px solid var(--border);
  background:rgba(0,90,41,.06);color:#fff;
  font-size:14px;font-family:var(--font-body);outline:none;
  transition:border-color .25s,background .25s,box-shadow .25s;
}
.search-input::placeholder{color:var(--text-muted)}
.search-input:focus{border-color:var(--green-mid);background:rgba(0,90,41,.12);box-shadow:0 0 0 3px rgba(0,127,63,.1)}
.search-svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-muted);pointer-events:none}

.header-actions{display:flex;align-items:center;gap:12px;flex-shrink:0}
.stat-badge{font-size:12px;color:var(--text-dim);font-weight:500}
.stat-badge b{color:var(--green-light);font-weight:700}
.dm-link{
  display:inline-flex;align-items:center;gap:6px;
  padding:8px 20px;border-radius:40px;
  border:1px solid var(--green-dark);background:transparent;
  color:var(--green-light);font-size:13px;font-weight:600;
  font-family:var(--font-body);cursor:pointer;
  text-decoration:none;transition:all .25s;white-space:nowrap;
}
.dm-link:hover{background:var(--green-dark);border-color:var(--green-mid)}

/* ── HERO ── */
.hero{
  padding:120px 32px 48px;text-align:center;
  background:radial-gradient(ellipse 70% 50% at 50% 0%,rgba(0,90,41,.12),transparent);
}
.hero-title{
  font-family:var(--font-display);font-size:clamp(36px,5vw,56px);
  font-weight:800;line-height:1.1;margin-bottom:12px;
}
.hero-title em{font-style:normal;color:var(--green-accent)}
.hero-sub{color:var(--text-dim);font-size:16px;font-weight:400;max-width:480px;margin:0 auto}

/* ── BRAND PILLS ── */
.brands-bar{
  max-width:1440px;margin:0 auto;padding:0 32px;
  position:sticky;top:64px;z-index:90;
  background:var(--bg);
  padding-top:16px;padding-bottom:16px;
  border-bottom:1px solid var(--border);
}
.brands-scroll{
  display:flex;gap:8px;overflow-x:auto;
  scrollbar-width:none;-webkit-overflow-scrolling:touch;
  padding-bottom:4px;
}
.brands-scroll::-webkit-scrollbar{display:none}
.brand-pill{
  flex-shrink:0;padding:7px 18px;border-radius:40px;
  border:1px solid var(--border);background:transparent;
  color:var(--text-dim);font-size:13px;font-weight:500;
  font-family:var(--font-body);cursor:pointer;
  transition:all .25s ease;white-space:nowrap;
}
.brand-pill:hover{border-color:var(--green-mid);color:var(--text)}
.brand-pill.active{
  background:var(--green-dark);border-color:var(--green-mid);
  color:var(--green-light);font-weight:600;
}
.brand-pill .pill-count{
  display:inline-block;margin-left:6px;font-size:11px;
  opacity:.5;font-weight:400;
}

/* ── TOOLBAR ── */
.toolbar{
  max-width:1440px;margin:0 auto;padding:20px 32px 8px;
  display:flex;align-items:center;gap:12px;flex-wrap:wrap;
}
.toolbar-title{
  font-family:var(--font-display);font-size:28px;font-weight:700;
  flex:1;min-width:200px;
}
.toolbar-title em{font-style:normal;color:var(--green-accent)}
.filter-group{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.filter-btn{
  padding:6px 14px;border-radius:20px;
  border:1px solid var(--border);background:transparent;
  color:var(--text-dim);font-size:12px;font-weight:500;
  font-family:var(--font-body);cursor:pointer;transition:all .2s;
}
.filter-btn:hover{border-color:var(--green-mid);color:var(--text)}
.filter-btn.active{background:rgba(0,90,41,.2);border-color:var(--green-mid);color:var(--green-light)}
.sort-sel{
  padding:7px 14px;border-radius:20px;
  border:1px solid var(--border);background:transparent;
  color:var(--text-dim);font-size:12px;font-family:var(--font-body);
  cursor:pointer;outline:none;
}
.sort-sel option{background:var(--bg);color:#fff}

/* ── ALBUM GRID ── */
.album-section{max-width:1440px;margin:0 auto;padding:24px 32px 60px}
.album-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:20px;
}
.album-card{
  position:relative;border-radius:var(--radius);overflow:hidden;cursor:pointer;
  aspect-ratio:4/5;border:1px solid var(--border);
  transition:transform .4s cubic-bezier(.2,.8,.3,1),box-shadow .4s,border-color .3s;
}
.album-card:hover{
  transform:translateY(-6px) scale(1.01);
  box-shadow:0 24px 48px rgba(0,0,0,.5),0 0 0 1px var(--border-hover);
  border-color:var(--border-hover);
}
.album-card img{
  width:100%;height:100%;object-fit:cover;
  transition:transform .6s cubic-bezier(.2,.8,.3,1);
}
.album-card:hover img{transform:scale(1.08)}
.album-overlay{
  position:absolute;inset:0;
  background:linear-gradient(to top,rgba(0,10,5,.92) 0%,rgba(0,10,5,.3) 40%,transparent 100%);
  display:flex;flex-direction:column;justify-content:flex-end;padding:24px;
  transition:background .3s;
}
.album-card:hover .album-overlay{background:linear-gradient(to top,rgba(0,10,5,.95) 0%,rgba(0,10,5,.35) 45%,transparent 100%)}
.album-name{
  font-family:var(--font-display);font-size:22px;font-weight:700;
  color:#fff;line-height:1.2;
}
.album-count{
  font-size:12px;color:var(--green-light);margin-top:6px;font-weight:500;
  display:flex;align-items:center;gap:6px;
}
.album-count::before{
  content:'';width:16px;height:1px;background:var(--green-accent);display:block;
}

/* ── PRODUCT GRID (masonry-like) ── */
.product-section{max-width:1440px;margin:0 auto;padding:0 32px 80px}
.product-grid{
  columns:4;column-gap:18px;
}
.product-card{
  break-inside:avoid;margin-bottom:18px;
  background:var(--bg-card);border-radius:var(--radius);overflow:hidden;
  border:1px solid var(--border);
  transition:transform .35s cubic-bezier(.2,.8,.3,1),box-shadow .35s,border-color .3s;
  cursor:pointer;
}
.product-card:hover{
  transform:translateY(-4px);
  box-shadow:0 16px 40px rgba(0,0,0,.45);
  border-color:var(--border-hover);
}
.product-img-wrap{position:relative;overflow:hidden;background:#0a110a}
.product-img{
  width:100%;display:block;
  transition:transform .5s cubic-bezier(.2,.8,.3,1);
}
.product-card:hover .product-img{transform:scale(1.04)}
.product-price{
  position:absolute;top:12px;right:12px;
  background:rgba(0,50,20,.85);backdrop-filter:blur(8px);
  color:var(--green-light);font-weight:700;font-size:13px;
  padding:5px 12px;border-radius:20px;
  border:1px solid rgba(0,127,63,.2);
}
.product-price.empty{display:none}
.product-body{padding:14px 16px 16px}
.product-brand{
  font-size:10px;color:var(--text-muted);font-weight:700;
  letter-spacing:1.8px;text-transform:uppercase;
}
.product-link{
  display:inline-block;margin-top:8px;
  font-size:12px;color:var(--green-mid);font-weight:500;
  text-decoration:none;transition:color .2s;
}
.product-link:hover{color:var(--green-light)}

/* ── BACK BUTTON ── */
.back-bar{
  max-width:1440px;margin:0 auto;padding:20px 32px 0;
}
.back-btn{
  display:inline-flex;align-items:center;gap:8px;
  padding:8px 20px;border-radius:40px;
  border:1px solid var(--border);background:transparent;
  color:var(--text-dim);font-size:13px;font-weight:500;
  font-family:var(--font-body);cursor:pointer;
  transition:all .25s;
}
.back-btn:hover{border-color:var(--green-mid);color:var(--text)}
.back-btn svg{width:16px;height:16px}

/* ── LIGHTBOX ── */
.lightbox{
  display:none;position:fixed;inset:0;z-index:300;
  background:rgba(0,0,0,.96);
  justify-content:center;align-items:center;
  cursor:pointer;
}
.lightbox.open{display:flex}
.lb-img{
  max-width:92vw;max-height:92vh;object-fit:contain;
  border-radius:8px;box-shadow:0 0 80px rgba(0,100,40,.12);
  cursor:default;
}
.lb-close{
  position:absolute;top:20px;right:24px;
  background:rgba(255,255,255,.08);border:none;border-radius:50%;
  width:44px;height:44px;display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:24px;cursor:pointer;
  transition:background .2s;z-index:301;
}
.lb-close:hover{background:rgba(255,255,255,.16)}
.lb-nav{
  position:absolute;top:50%;transform:translateY(-50%);
  background:rgba(0,61,31,.6);border:1px solid rgba(0,127,63,.25);
  border-radius:50%;width:52px;height:52px;
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:22px;cursor:pointer;z-index:301;
  transition:background .2s,opacity .2s;opacity:.7;
}
.lb-nav:hover{background:rgba(0,127,63,.7);opacity:1}
.lb-prev{left:20px}
.lb-next{right:20px}
.lb-info{
  position:absolute;bottom:24px;left:50%;transform:translateX(-50%);
  background:rgba(0,30,15,.8);backdrop-filter:blur(12px);
  padding:10px 24px;border-radius:40px;
  border:1px solid rgba(0,127,63,.2);
  font-size:13px;color:var(--text-dim);
  display:flex;align-items:center;gap:16px;
  white-space:nowrap;z-index:301;
}
.lb-info b{color:var(--green-light);font-weight:600}
.lb-info a{color:var(--green-mid);text-decoration:none}
.lb-info a:hover{color:var(--green-light)}

/* ── NO RESULTS ── */
.no-results{
  display:none;text-align:center;padding:80px 20px;
  color:var(--text-muted);
}
.no-results.visible{display:block}
.no-results-icon{font-size:48px;margin-bottom:16px;opacity:.4}
.no-results-text{font-size:16px}

/* ── FOOTER ── */
.footer{
  text-align:center;padding:40px 32px;
  border-top:1px solid var(--border);
  color:var(--text-muted);font-size:12px;
}
.footer a{color:var(--green-mid);text-decoration:none}
.footer a:hover{color:var(--green-light)}

/* ── FADE IN ── */
.fade-in{opacity:0;transform:translateY(16px);transition:opacity .5s ease,transform .5s ease}
.fade-in.visible{opacity:1;transform:translateY(0)}

/* ── RESPONSIVE ── */
@media(max-width:1100px){
  .product-grid{columns:3}
}
@media(max-width:860px){
  .header-inner{padding:0 16px;height:56px}
  .hero{padding:90px 16px 32px}
  .brands-bar{padding:0 16px;padding-top:12px;padding-bottom:12px;top:56px}
  .toolbar{padding:16px 16px 4px}
  .album-section,.product-section,.back-bar{padding-left:16px;padding-right:16px}
  .product-grid{columns:2;column-gap:12px}
  .product-card{margin-bottom:12px}
  .album-grid{grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px}
  .dm-link{display:none}
  .stat-badge{display:none}
}
@media(max-width:480px){
  .product-grid{columns:2;column-gap:10px}
  .product-card{margin-bottom:10px}
  .album-grid{grid-template-columns:repeat(2,1fr);gap:10px}
  .search-box{max-width:none;flex:1}
  .hero-title{font-size:28px}
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(0,90,41,.25);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:rgba(0,127,63,.4)}

.subcat-bar{max-width:1440px;margin:0 auto;padding:8px 32px 0}
.subcat-pills{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.subcat-pill{
  padding:6px 14px;border-radius:20px;font-size:13px;font-weight:500;
  border:1px solid var(--border);color:var(--text-dim);background:transparent;
  cursor:pointer;transition:all .2s ease;white-space:nowrap;font-family:var(--font-body);
}
.subcat-pill:hover{border-color:var(--green-mid);color:var(--text)}
.subcat-pill.active{background:var(--green-deep);border-color:var(--green-mid);color:var(--green-light)}
.subcat-pill .subcat-count{font-size:11px;opacity:.5;margin-left:4px}
.subcat-section-header{
  grid-column:1/-1;padding:24px 0 8px;
  font-family:var(--font-display);font-size:20px;font-weight:600;
  color:var(--green-light);border-bottom:1px solid var(--border);margin-bottom:8px;
}
</style>
</head>

er f1 team c44"],["lego","65","bwt alpine f1 team a524","https://www.lego.com/product/bwt-alpine-f1-team-a524-77248","https://images.brickset.com/sets/large/77248-1.jpg","subcat:f1,77248,bwt alpine f1 team a524"],["lego","65","williams racing fw46 f1","https://www.lego.com/product/williams-racing-fw46-f1-77249","https://images.brickset.com/sets/large/77249-1.jpg","subcat:f1,77249,williams racing fw46 f1"],["lego","65","moneygram haas f1 team vf-24","https://www.lego.com/product/moneygram-haas-f1-team-vf-24-77250","https://images.brickset.com/sets/large/77250-1.jpg","subcat:f1,77250,moneygram haas f1 team vf-24"],["lego","65","mclaren mcl38 f1 team","https://www.lego.com/product/mclaren-mcl38-f1-team-77251","https://images.brickset.com/sets/large/77251-1.jpg","subcat:f1,77251,mclaren mcl38 f1 team"],["lego","65","f1 pit stop & ferrari","https://www.lego.com/product/f1-pit-stop-&-ferrari-60443","https://images.brickset.com/sets/large/60443-1.jpg","subcat:f1,60443,f1 pit stop & ferrari"],["lego","105","f1 truck avec rb20 & amr24","https://www.lego.com/product/f1-truck-avec-rb20-&-amr24-60445","https://images.brickset.com/sets/large/60445-1.jpg","subcat:f1,60445,f1 truck avec rb20 & amr24"],["lego","255","titanic","https://www.lego.com/product/titanic-10294","https://images.brickset.com/sets/large/10294-1.jpg","subcat:autres,10294,titanic"],["lego","325","colisée","https://www.lego.com/product/colisée-10276","https://images.brickset.com/sets/large/10276-1.jpg","subcat:autres,10276,colisée"],["lego","Non disponible","poste de police","https://www.lego.com/product/poste-de-police-10278","https://images.brickset.com/sets/large/10278-1.jpg","subcat:autres,10278,poste de police"],["lego","160","l'endurance","https://www.lego.com/product/lendurance-10335","https://images.brickset.com/sets/large/10335-1.jpg","subcat:autres,10335,l'endurance"],["lego","Non disponible","vieux magasin de pêche","https://www.lego.com/product/vieux-magasin-de-pêche-21310","https://images.brickset.com/sets/large/21310-1.jpg","subcat:autres,21310,vieux magasin de pêche"],["lego","160","donjons & dragons – le récit du dragon rouge","https://www.lego.com/product/donjons-&-dragons--le-récit-du-dragon-rouge-21348","https://images.brickset.com/sets/large/21348-1.jpg","subcat:autres,21348,donjons & dragons – le récit du dragon rouge"],["lego","245","le restaurant parisien","https://www.lego.com/product/le-restaurant-parisien-10243","https://images.brickset.com/sets/large/10243-1.jpg","subcat:autres,10243,le restaurant parisien"],["lego","Non disponible","jurassic park – la fureur du t. rex","https://www.lego.com/product/jurassic-park--la-fureur-du-t.-rex-75936","https://images.brickset.com/sets/large/75936-1.jpg","subcat:autres,75936,jurassic park – la fureur du t. rex"]];
const LEGO_SUBCATS = {"starwars":"Star Wars","cars":"Cars","autres":"Autres","lotr":"Seigneur des Anneaux","pirates":"Pirates","hp":"Harry Potter","medieval":"Medieval","technic":"Technic","f1":"F1"};
let currentSubcat = "all";

/* Product format: [album_id, price, brand, flickr_url, image_url, search_tags] */

/* ── STATE ── */
let currentAlbum = null;
let currentFilter = 'all';
let currentSort = 'default';
let filteredProducts = [];
let lbIndex = 0;
let lbList = [];

/* ── DOM ── */
const $ = id => document.getElementById(id);
const albumGrid = $('albumGrid');
const albumSection = $('albumSection');
const productGrid = $('productGrid');
const productSection = $('productSection');
const brandsScroll = $('brandsScroll');
const toolbar = $('toolbar');
const toolbarTitle = $('toolbarTitle');
const backBar = $('backBar');
const hero = $('hero');
const searchInput = $('searchInput');
const noResults = $('noResults');
const sortSel = $('sortSel');

/* ── INIT ── */
function init() {
  renderBrandPills();
  renderAlbums();
  bindEvents();
  observeFadeIns();
}

function renderBrandPills() {
  let h = '<button class="brand-pill active" data-album="all">Toutes<span class="pill-count">'+PRODUCTS.length+'</span></button>';
  ALBUMS.forEach(a => {
    h += '<button class="brand-pill" data-album="'+a.id+'">'+esc(a.name)+'<span class="pill-count">'+a.count+'</span></button>';
  });
  brandsScroll.innerHTML = h;
}

function renderAlbums() {
  currentAlbum = null;
  albumSection.style.display = '';
  productSection.style.display = 'none';
  toolbar.style.display = 'none';
  backBar.style.display = 'none';
  hero.style.display = '';
  
  let h = '';
  ALBUMS.forEach((a, i) => {
    h += '<div class="album-card fade-in" onclick="openAlbum(&apos;'+a.id+'&apos;)" style="transition-delay:'+(i*40)+'ms">';
    h += '<img src="'+a.cover+'" alt="'+esc(a.name)+'" loading="lazy">';
    h += '<div class="album-overlay"><div class="album-name">'+esc(a.name)+'</div>';
    h += '<div class="album-count">'+a.count+' articles</div></div></div>';
  });
  albumGrid.innerHTML = h;
  observeFadeIns();
  setActivePill('all');
  window.scrollTo({top:0, behavior:'smooth'});
}


function renderSubcatPills() {
  const prods = PRODUCTS.filter(p => p[0] === 'lego');
  const counts = {};
  prods.forEach(p => {
    const m = p[5].match(/^subcat:(\w+)/);
    if (m) counts[m[1]] = (counts[m[1]]||0) + 1;
  });
  let h = '<button class="subcat-pill active" onclick="filterSubcat(\'all\')">Tous<span class="subcat-count">' + prods.length + '</span></button>';
  const order = ['starwars','technic','cars','f1','medieval','autres','lotr','pirates','hp'];
  order.forEach(k => {
    if (LEGO_SUBCATS[k] && counts[k]) {
      h += '<button class="subcat-pill" onclick="filterSubcat(\'' + k + '\')">' + LEGO_SUBCATS[k] + '<span class="subcat-count">' + counts[k] + '</span></button>';
    }
  });
  subcatPills.innerHTML = h;
}

function filterSubcat(subcat) {
  currentSubcat = subcat;
  subcatPills.querySelectorAll('.subcat-pill').forEach(b => {
    const isAll = !b.getAttribute('onclick').includes("'") || b.getAttribute('onclick').includes("'all'");
    b.classList.toggle('active', subcat === 'all' ? isAll : b.getAttribute('onclick').includes("'" + subcat + "'"));
  });
  renderProducts();
}

function openAlbum(albumId) {
  currentAlbum = albumId;
  const album = ALBUMS.find(a => a.id === albumId);
  albumSection.style.display = 'none';
  productSection.style.display = '';
  toolbar.style.display = 'flex';
  backBar.style.display = '';
  hero.style.display = 'none';
  toolbarTitle.innerHTML = '<em>' + esc(album ? album.name : '') + '</em>';
  currentFilter = 'all';
  currentSort = 'default';
  sortSel.value = 'default';
  currentSubcat = 'all';
  if (albumId === 'lego') { subcatBar.style.display = ''; renderSubcatPills(); } else { subcatBar.style.display = 'none'; }
  document.querySelectorAll('#priceFilters .filter-btn').forEach(b => b.classList.toggle('active', b.dataset.range === 'all'));
  setActivePill(albumId);
  renderProducts();
  window.scrollTo({top:0, behavior:'smooth'});
}

function goHome() {
  searchInput.value = '';
  subcatBar.style.display = 'none';
  currentSubcat = 'all';
  renderAlbums();
}

/* ── PRODUCTS ── */
function getProducts() {
  let list = currentAlbum ? PRODUCTS.filter(p => p[0] === currentAlbum) : [...PRODUCTS];
  if (currentAlbum === 'lego' && currentSubcat !== 'all') {
    list = list.filter(p => p[5].startsWith('subcat:' + currentSubcat + ','));
  }
  
  const q = searchInput.value.trim().toLowerCase();
  if (q) {
    list = PRODUCTS.filter(p => p[5].toLowerCase().includes(q));
    if (currentAlbum) list = list.filter(p => p[0] === currentAlbum);
  }
  
  if (currentFilter !== 'all') {
    list = list.filter(p => {
      const num = parsePrice(p[1]);
      if (!num) return false;
      switch(currentFilter) {
        case '0-50': return num < 50;
        case '50-80': return num >= 50 && num <= 80;
        case '80-120': return num >= 80 && num <= 120;
        case '120+': return num >= 120;
        default: return true;
      }
    });
  }
  
  if (currentAlbum === 'lego' && currentSubcat === 'all' && currentSort === 'default') {
    const order = ['starwars','technic','cars','f1','medieval','autres','lotr','pirates','hp'];
    list.sort((a,b) => {
      const sa = (a[5].match(/^subcat:(\w+)/) || ['','z'])[1];
      const sb = (b[5].match(/^subcat:(\w+)/) || ['','z'])[1];
      return order.indexOf(sa) - order.indexOf(sb);
    });
  }
  if (currentSort === 'price-asc') list.sort((a,b) => (parsePrice(a[1])||9999) - (parsePrice(b[1])||9999));
  else if (currentSort === 'price-desc') list.sort((a,b) => (parsePrice(b[1])||0) - (parsePrice(a[1])||0));
  
  return list;
}

function renderProducts() {
  filteredProducts = getProducts();
  lbList = filteredProducts;
  
  if (!filteredProducts.length) {
    productGrid.innerHTML = '';
    noResults.classList.add('visible');
    return;
  }
  noResults.classList.remove('visible');
  
  let h = '';
  let lastSubcat = '';
  filteredProducts.forEach((p, i) => {
    if (currentAlbum === 'lego' && currentSubcat === 'all') {
      const sm = p[5].match(/^subcat:(\w+)/);
      const sc = sm ? sm[1] : '';
      if (sc !== lastSubcat) {
        lastSubcat = sc;
        h += '<div class="subcat-section-header">' + (LEGO_SUBCATS[sc] || sc) + '</div>';
      }
    }
    const price = p[1];
    const brand = p[2];
    const flickr = p[3];
    const img = p[4];
    
    h += '<div class="product-card fade-in" onclick="openLightbox('+i+')" style="transition-delay:'+(Math.min(i,20)*30)+'ms">';
    h += '<div class="product-img-wrap">';
    h += '<img class="product-img" src="'+img+'" alt="'+esc(brand)+'" loading="lazy">';
    if (price) h += '<div class="product-price">'+esc(price)+'</div>';
    h += '</div>';
    h += '<div class="product-body">';
    h += '<div class="product-brand">'+esc(brand)+'</div>';
    h += '<a class="product-link" href="'+flickr+'" target="_blank" rel="noopener" onclick="event.stopPropagation()">'+(flickr.includes('lego.com')?'Voir sur LEGO.com':'Voir sur Flickr')+' &rarr;</a>';
    h += '</div></div>';
  });
  productGrid.innerHTML = h;
  observeFadeIns();
}

/* ── LIGHTBOX ── */
function openLightbox(idx) {
  lbIndex = idx;
  lbList = filteredProducts;
  updateLightbox();
  $('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLightbox() {
  $('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}
function navLightbox(dir) {
  lbIndex = (lbIndex + dir + lbList.length) % lbList.length;
  updateLightbox();
}
function updateLightbox() {
  const p = lbList[lbIndex];
  if (!p) return;
  $('lbImg').src = p[4];
  $('lbInfo').innerHTML = '<b>'+esc(p[2])+'</b>' + (p[1] ? ' &middot; '+esc(p[1]) : '') + ' &middot; <a href="'+p[3]+'" target="_blank" rel="noopener" onclick="event.stopPropagation()">Flickr</a> &middot; '+(lbIndex+1)+'/'+lbList.length;
}

/* ── EVENTS ── */
function bindEvents() {
  // Brand pills
  brandsScroll.addEventListener('click', e => {
    const pill = e.target.closest('.brand-pill');
    if (!pill) return;
    const albumId = pill.dataset.album;
    if (albumId === 'all') goHome();
    else openAlbum(albumId);
  });
  
  // Search
  let searchTimer;
  searchInput.addEventListener('input', () => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
      if (searchInput.value.trim()) {
        // Show products view with search across all
        if (!currentAlbum) {
          albumSection.style.display = 'none';
          productSection.style.display = '';
          toolbar.style.display = 'flex';
          backBar.style.display = '';
          hero.style.display = 'none';
          toolbarTitle.innerHTML = 'R&eacute;sultats';
        }
        renderProducts();
      } else if (!currentAlbum) {
        renderAlbums();
      } else {
        renderProducts();
      }
    }, 200);
  });
  
  // Price filters
  $('priceFilters').addEventListener('click', e => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    currentFilter = btn.dataset.range;
    document.querySelectorAll('#priceFilters .filter-btn').forEach(b => b.classList.toggle('active', b.dataset.range === currentFilter));
    renderProducts();
  });
  
  // Sort
  sortSel.addEventListener('change', () => {
    currentSort = sortSel.value;
    renderProducts();
  });
  
  // Lightbox keyboard
  document.addEventListener('keydown', e => {
    if (!$('lightbox').classList.contains('open')) return;
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowLeft') navLightbox(-1);
    if (e.key === 'ArrowRight') navLightbox(1);
  });
  
  // Lightbox backdrop close
  $('lightbox').addEventListener('click', e => {
    if (e.target === $('lightbox')) closeLightbox();
  });
}

function setActivePill(albumId) {
  brandsScroll.querySelectorAll('.brand-pill').forEach(p => p.classList.toggle('active', p.dataset.album === albumId));
}

/* ── UTILS ── */
function parsePrice(s) {
  if (!s) return 0;
  const m = s.match(/(\d+)/);
  return m ? parseInt(m[1]) : 0;
}
function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

/* ── FADE IN OBSERVER ── */
function observeFadeIns() {
        if (window._fadeObserver) window._fadeObserver.disconnect();
        window._fadeObserver = new IntersectionObserver((entries) => {
          entries.forEach(e => {
            if (e.isIntersecting) {
              e.target.classList.add('visible');
              window._fadeObserver.unobserve(e.target);
            }
          });
        }, {threshold:0.01, rootMargin:'600px'});
        requestAnimationFrame(() => {
          const els = document.querySelectorAll('.fade-in:not(.visible)');
          els.forEach(el => window._fadeObserver.observe(el));
          // Safety net: force all cards visible after 800ms if observer missed them
          setTimeout(() => {
            document.querySelectorAll('.fade-in:not(.visible)').forEach(el => el.classList.add('visible'));
          }, 800);
        });
      }

/* ── GO ── */
init();
</script>
</body>
</html>
