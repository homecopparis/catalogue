<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="referrer" content="no-referrer">
<title>Home Cop Paris — Catalogue</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0a;--card:#141414;--card-hover:#1a1a1a;--green:#00e676;--green-dim:rgba(0,230,118,.15);--text:#f0f0f0;--text-dim:rgba(240,240,240,.55);--sidebar-w:260px;--font-display:'Playfair Display',Georgia,serif;--font-body:'Inter',system-ui,sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
#loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999}
#loading .spinner{width:48px;height:48px;border:3px solid #222;border-top-color:var(--green);border-radius:50%;animation:spin 1s linear infinite}
#loading p{margin-top:16px;color:var(--text-dim);font-size:14px}
@keyframes spin{to{transform:rotate(360deg)}}
.sidebar{position:fixed;top:0;left:0;width:var(--sidebar-w);height:100vh;background:#111;border-right:1px solid #222;display:flex;flex-direction:column;z-index:200;transition:transform .3s}
.sidebar-header{padding:20px 16px 12px;border-bottom:1px solid #222}
.sidebar-logo{display:flex;align-items:center;gap:10px;margin-bottom:12px;text-decoration:none}
.sidebar-logo img{width:40px;height:40px;border-radius:8px}
.sidebar-logo span{font-family:var(--font-display);font-size:18px;font-weight:700;color:var(--text)}
.sidebar-logo .cop{color:var(--green)}
.search-wrap{position:relative}
.search-box{width:100%;padding:8px 12px;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:var(--text);font-size:13px;outline:none}
.search-box:focus{border-color:var(--green)}
.search-suggest{position:absolute;top:100%;left:0;right:0;background:#1a1a1a;border:1px solid #333;border-top:none;border-radius:0 0 8px 8px;max-height:260px;overflow-y:auto;z-index:210;display:none;scrollbar-width:thin}
.search-suggest.open{display:block}
.sug-item{padding:8px 12px;cursor:pointer;font-size:13px;color:var(--text-dim);display:flex;justify-content:space-between;align-items:center;gap:8px}
.sug-item:hover,.sug-item.active{background:#252525;color:var(--text)}
.sug-item .sug-type{font-size:10px;color:var(--green);opacity:.7;white-space:nowrap}
.sug-item .sug-label{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.search-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.search-tag{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;background:var(--green-dim);color:var(--green);border-radius:12px;font-size:11px;cursor:default}
.search-tag .tag-x{cursor:pointer;opacity:.6;font-size:13px}
.search-tag .tag-x:hover{opacity:1}
.search-results-info{padding:4px 0;font-size:11px;color:var(--text-dim);margin-bottom:8px}
.sidebar-stats{padding:8px 16px;font-size:11px;color:var(--text-dim);border-bottom:1px solid #222}
.sidebar-menu{flex:1;overflow-y:auto;padding:8px 0;scrollbar-width:thin}
.menu-item{display:flex;justify-content:space-between;align-items:center;padding:8px 16px;cursor:pointer;font-size:13px;color:var(--text-dim);transition:all .15s}
.menu-item:hover{background:#1a1a1a;color:var(--text)}
.menu-item.active{color:var(--green);background:var(--green-dim)}
.menu-item .count{font-size:11px;opacity:.6}
.sidebar-footer{padding:12px 16px;border-top:1px solid #222}
.dm-btn{display:block;width:100%;padding:10px;background:var(--green);color:#000;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;text-align:center;text-decoration:none}
.main{margin-left:var(--sidebar-w);min-height:100vh;padding:24px 32px}
.hero{text-align:center;padding:40px 0 32px}
.hero h1{font-family:var(--font-display);font-size:clamp(28px,4vw,48px);font-weight:800}
.hero h1 em{color:var(--green);font-style:italic}
.brands-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;margin-top:16px}
.brand-card{position:relative;aspect-ratio:1;border-radius:12px;overflow:hidden;cursor:pointer;background:#1a1a1a}
.brand-card img{width:100%;height:100%;object-fit:cover;transition:transform .3s}
.brand-card:hover img{transform:scale(1.05)}
.brand-overlay{position:absolute;inset:0;background:linear-gradient(transparent 40%,rgba(0,0,0,.85));display:flex;flex-direction:column;justify-content:flex-end;padding:16px}
.brand-overlay .name{font-weight:600;font-size:15px}
.brand-overlay .cnt{font-size:12px;color:var(--green);margin-top:2px}
.products-section{display:none}
.products-header{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.products-header h2{font-family:var(--font-display);font-size:24px;font-weight:700}
.products-header .back-btn{background:none;border:none;color:var(--green);font-size:22px;cursor:pointer;padding:4px 8px}
.products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px}
.product-card{background:var(--card);border-radius:10px;overflow:hidden;cursor:pointer;transition:background .2s}
.product-card:hover{background:var(--card-hover)}
.product-card img{width:100%;aspect-ratio:1;object-fit:cover;background:#1a1a1a}
.product-card .info{padding:10px 12px}
.product-card .pname{font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.product-card .price{color:var(--green);font-size:14px;font-weight:600;margin-top:4px}
#sentinel{height:1px}
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:500;display:none;align-items:center;justify-content:center;flex-direction:column}
.lightbox.open{display:flex}
.lightbox img{max-width:90vw;max-height:80vh;border-radius:8px;object-fit:contain}
.lightbox .lb-info{margin-top:12px;text-align:center}
.lightbox .lb-info .lb-brand{font-size:13px;color:var(--text-dim)}
.lightbox .lb-info .lb-price{font-size:18px;color:var(--green);font-weight:600;margin-top:4px}
.lightbox .lb-close{position:absolute;top:20px;right:24px;background:none;border:none;color:var(--text);font-size:28px;cursor:pointer}
.lightbox .lb-back{position:absolute;top:20px;left:24px;background:none;border:none;color:var(--green);font-size:15px;cursor:pointer;display:flex;align-items:center;gap:6px}
.hamburger{display:none;position:fixed;top:12px;left:12px;z-index:300;background:#111;border:1px solid #333;color:var(--text);font-size:22px;width:40px;height:40px;border-radius:8px;cursor:pointer;align-items:center;justify-content:center}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:150}
@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .overlay.open{display:block}
  .hamburger{display:flex}
  .main{margin-left:0;padding:16px}
  .products-header{padding-left:50px}
  .brands-grid{grid-template-columns:repeat(2,1fr)}
  .products-grid{grid-template-columns:repeat(2,1fr)}
  .hero h1{font-size:24px}
}
@keyframes fadeInUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.brand-card,.product-card{animation:fadeInUp .4s ease both}
</style>
</head>
<body>
<div id="loading"><div class="spinner"></div><p>Chargement du catalogue…</p></div>
<button class="hamburger" onclick="toggleSidebar()">☰</button>
<div class="overlay" onclick="toggleSidebar()"></div>
<aside class="sidebar">
  <div class="sidebar-header">
    <a class="sidebar-logo" href="#" onclick="showHome();return false">
      <img src="logo.png" alt="Logo" referrerpolicy="no-referrer">
      <span>Home<span class="cop">Cop Paris</span></span>
    </a>
    <div class="search-wrap">
      <input class="search-box" id="searchInput" type="text" placeholder="Rechercher… ex: hoodie noir nike" oninput="onSmartSearch(this.value)" onkeydown="onSearchKey(event)" autocomplete="off">
      <div class="search-suggest" id="searchSuggest"></div>
    </div>
    <div class="search-tags" id="searchTags"></div>
  </div>
  <div class="sidebar-stats" id="sidebarStats"></div>
  <nav class="sidebar-menu" id="sidebarMenu"></nav>
  <div class="sidebar-footer">
    <a class="dm-btn" href="https://www.instagram.com/homecopparis/" target="_blank" rel="noopener">DM Instagram</a>
  </div>
</aside>
<main class="main">
  <div class="hero" id="hero"><h1>Streetwear & <em>Luxe</em></h1></div>
  <div class="brands-grid" id="brandsGrid"></div>
  <div class="products-section" id="productsSection">
    <div class="products-header" id="productsHeader"></div>
    <div class="products-grid" id="productsGrid"></div>
    <div id="sentinel"></div>
  </div>
</main>
<div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
  <button class="lb-back" onclick="closeLightbox(event)">← Retour</button>
  <button class="lb-close" onclick="closeLightbox(event)">✕</button>
  <img id="lbImg" src="" alt="" referrerpolicy="no-referrer">
  <div class="lb-info"><div class="lb-brand" id="lbBrand"></div><div class="lb-price" id="lbPrice"></div></div>
</div>
<script>
var PREFIX='',CATEGORIES=[],PRODUCTS=[],CURRENT_VIEW='home',CURRENT_CAT=null;
var FILTERED=[],RENDER_INDEX=0,BATCH_SIZE=48;
var searchTimer=null;

/* URL helpers — reconstruct from prefix + photo_id + secret, or return full URL */
function imgUrl(pid,secret,size){if(pid&&pid.indexOf('http')===0)return pid;return PREFIX+pid+'_'+secret+'_'+size+'.jpg'}

fetch('data.json').then(function(r){return r.json()}).then(function(data){
  PREFIX=data.prefix||'https://live.staticflickr.com/65535/';
  var rawCats=data.categories||[];
  var rawProds=data.products||[];
  /* Normalize: support both optimized (short) and full field names */
  CATEGORIES=rawCats.map(function(c){
    if(c.n)return c; /* already optimized */
    var coverUrl=c.cover_image||'';
    var parts=coverUrl.match(/\/(\d+)_(\w+)_\w+\.jpg/)||[];
    return{id:c.album_id||c.id,n:c.album_title||c.n||'',c:c.count||c.c||0,cp:parts[1]||c.cp||'',cs:parts[2]||c.cs||''};
  });
  PRODUCTS=rawProds.map(function(p){
    if(p.a!==undefined&&p.ts!==undefined)return p; /* already optimized */
    var imgParts=(p.image_url||'').match(/\/(\d+)_(\w+)_\w+\.jpg/)||[];
    var thumbParts=(p.thumb_url||'').match(/\/(\d+)_(\w+)_\w+\.jpg/)||[];
    return{a:p.album_id||p.a||'',p:imgParts[1]||p.photo_id||p.p||'',s:imgParts[2]||p.s||'',ts:thumbParts[2]||p.ts||'',t:p.title||p.t||'',u:p.date_upload||p.u||0};
  });
  CATEGORIES.sort(function(a,b){return(a.n||'').toLowerCase().localeCompare((b.n||'').toLowerCase())});
  init();
}).catch(function(e){
  document.getElementById('loading').innerHTML='<p style="color:#f44">Erreur: '+e.message+'</p>';
});

function init(){
  document.getElementById('loading').style.display='none';
  buildSearchIndex();buildSidebar();showHome();setupInfiniteScroll();setupKeyboard();setupImageRetry();
}

function buildSidebar(){
  document.getElementById('sidebarStats').textContent=PRODUCTS.length+' articles · '+CATEGORIES.length+' marques';
  var h='<div class="menu-item active" data-cat="home" onclick="showHome()"><span>Accueil</span></div>';
  h+='<div class="menu-item" data-cat="nouveautes" onclick="showNouveautes()"><span>Nouveautés</span><span class="count">'+PRODUCTS.length+'</span></div>';
  for(var i=0;i<CATEGORIES.length;i++){
    var c=CATEGORIES[i];
    h+='<div class="menu-item" data-cat="'+c.id+'" onclick="showBrand(\''+c.id+'\')"><span>'+escH(c.n)+'</span><span class="count">'+c.c+'</span></div>';
  }
  document.getElementById('sidebarMenu').innerHTML=h;
}

function setActiveMenu(catId){
  var items=document.querySelectorAll('.menu-item');
  for(var i=0;i<items.length;i++){items[i].classList.toggle('active',items[i].getAttribute('data-cat')===catId)}
}

function showHome(){
  CURRENT_VIEW='home';CURRENT_CAT=null;setActiveMenu('home');
  document.getElementById('hero').style.display='';
  document.getElementById('brandsGrid').style.display='';
  document.getElementById('productsSection').style.display='none';
  renderBrandCards(CATEGORIES);closeSidebarMobile();
}

function showNouveautes(){
  CURRENT_VIEW='nouveautes';CURRENT_CAT=null;setActiveMenu('nouveautes');
  document.getElementById('hero').style.display='none';
  document.getElementById('brandsGrid').style.display='none';
  document.getElementById('productsSection').style.display='block';
  document.getElementById('productsHeader').innerHTML='<h2>Nouveautés</h2>';
  FILTERED=PRODUCTS.slice().sort(function(a,b){return(b.u||0)-(a.u||0)});
  RENDER_INDEX=0;document.getElementById('productsGrid').innerHTML='';
  renderBatch();closeSidebarMobile();
}

function showBrand(albumId){
  CURRENT_VIEW='brand';CURRENT_CAT=albumId;setActiveMenu(albumId);
  document.getElementById('hero').style.display='none';
  document.getElementById('brandsGrid').style.display='none';
  document.getElementById('productsSection').style.display='block';
  var cat=CATEGORIES.find(function(c){return c.id===albumId});
  var catName=cat?cat.n:albumId;
  document.getElementById('productsHeader').innerHTML='<button class="back-btn" onclick="showHome()">←</button><h2>'+escH(catName)+'</h2>';
  FILTERED=PRODUCTS.filter(function(p){return p.a===albumId});
  RENDER_INDEX=0;document.getElementById('productsGrid').innerHTML='';
  renderBatch();closeSidebarMobile();
}

function renderBrandCards(cats){
  var g=document.getElementById('brandsGrid');var h='';
  for(var i=0;i<cats.length;i++){
    var c=cats[i];
    var cover=c.cp?(c.cp.indexOf('http')===0?c.cp:((c.cs)?imgUrl(c.cp,c.cs,'z'):'')):'';

    h+='<div class="brand-card" onclick="showBrand(\''+c.id+'\')">';
    h+='<img src="'+escH(cover)+'" alt="'+escH(c.n)+'" loading="lazy" referrerpolicy="no-referrer">';
    h+='<div class="brand-overlay"><div class="name">'+escH(c.n)+'</div><div class="cnt">'+c.c+' articles</div></div></div>';
  }
  g.innerHTML=h;
}

function renderBatch(){
  var grid=document.getElementById('productsGrid');
  var end=Math.min(RENDER_INDEX+BATCH_SIZE,FILTERED.length);var h='';
  for(var i=RENDER_INDEX;i<end;i++){
    var p=FILTERED[i];
    var cardImg=p.p?(p.p.indexOf('http')===0?p.p:((p.ts)?imgUrl(p.p,p.ts,'n'):'')):'';

    var price=extractPrice(p.t);
    h+='<div class="product-card" onclick="openLightbox('+i+')">';
    h+='<img src="'+escH(cardImg)+'" alt="'+escH(p.t||'')+'" loading="lazy" referrerpolicy="no-referrer">';
    h+='<div class="info"><div class="pname">'+escH(p.t||'Sans titre')+'</div>';
    if(price)h+='<div class="price">'+price+'</div>';
    h+='</div></div>';
  }
  grid.insertAdjacentHTML('beforeend',h);RENDER_INDEX=end;
}

function setupInfiniteScroll(){
  var sentinel=document.getElementById('sentinel');
  var obs=new IntersectionObserver(function(entries){
    if(entries[0].isIntersecting&&RENDER_INDEX<FILTERED.length)renderBatch();
  },{rootMargin:'400px'});
  obs.observe(sentinel);
}

/* ═══════════════════════════════════════════════════════
   SMART SEARCH ENGINE v2 — strict AND filtering, confidence scoring
   ═══════════════════════════════════════════════════════ */

/* ── Confidence threshold — below this, a match is ignored ── */
var CONF_THRESHOLD=0.6;

/* ── Scoring weights (type=0.4, brand=0.3, color=0.2, text=0.1) ── */
var W_TYPE=40,W_BRAND=30,W_COLOR=20,W_TEXT=10;

/* ── Dictionnaire types produit (canonical → synonymes) ── */
var TYPE_DICT={
  'T-shirt':['t-shirt','tshirt','tee shirt','tee-shirt','t shirt','teeshirt','maillot'],
  'Hoodie':['hoodie','hoody','capuche','sweat à capuche','sweat capuche'],
  'Sweatshirt':['sweatshirt','sweat','sweater','pull-over','pullover'],
  'Pull':['pull','pullover','tricot','knit','knitwear'],
  'Veste':['veste','jacket','blazer','blouson','bomber','doudoune','puffer','manteau','coat','parka','windbreaker','coupe-vent','coupe vent','gilet'],
  'Chemise':['chemise','shirt','blouse','chemisette'],
  'Polo':['polo'],
  'Pantalon':['pantalon','pants','pant','trousers','chino','chinos','cargo','jogging','jogger','joggers','survêtement','survet','survetement','trackpant','trackpants','track pant'],
  'Jeans':['jean','jeans','denim'],
  'Short':['short','shorts','bermuda','bermudas'],
  'Ensemble':['ensemble','set','survêtement','survet','tracksuit','costume','suit','co-ord','coord'],
  'Chaussures':['chaussure','chaussures','shoe','shoes','sneaker','sneakers','basket','baskets','boots','boot','botte','bottes','mule','mules','sandale','sandales','loafer','loafers','mocassin'],
  'Casquette':['casquette','cap','caps','bob','bobs','bonnet','bonnets','chapeau','hat','fitted','snapback','trucker','beanie'],
  'Sac':['sac','bag','bags','sacoche','pochette','besace','backpack','tote','clutch','messenger','banane','fanny pack','bumbag'],
  'Ceinture':['ceinture','belt','belts','ceintures'],
  'Écharpe':['écharpe','echarpe','scarf','scarves','foulard','châle','chale','shawl','étole','etole'],
  'Lunettes':['lunettes','sunglasses','glasses','eyewear'],
  'Accessoire':['accessoire','accessoires','bijou','bijoux','bracelet','collier','bague','ring','chain','chaîne','chaine','montre','watch','portefeuille','wallet','porte-carte','cardholder']
};

/* ── Dictionnaire couleurs (canonical → synonymes) ── */
var COLOR_DICT={
  'Noir':['noir','noire','noirs','black','blk'],
  'Blanc':['blanc','blanche','blancs','white','wht','cream','crème','creme','ivoire','ivory','ecru','écru'],
  'Bleu':['bleu','bleue','bleus','blue','azur','cyan','cobalt','indigo'],
  'Bleu marine':['bleu marine','marine','navy','dark blue','bleu foncé','bleu fonce'],
  'Rouge':['rouge','rouges','red','bordeaux','burgundy','bourgogne','carmin','vermillon','cerise','cherry','crimson'],
  'Vert':['vert','verte','verts','green','emeraude','émeraude','sapin','forest','lime'],
  'Olive':['olive','kaki','khaki','army','militaire','army green','olive green','vert olive','vert kaki'],
  'Gris':['gris','grise','grey','gray','anthracite','charcoal','silver','argenté','argente','heather'],
  'Rose':['rose','roses','pink','fuchsia','magenta','salmon','saumon'],
  'Orange':['orange','orangé','orange','tangerine','corail','coral'],
  'Jaune':['jaune','jaunes','yellow','gold','doré','dore','or','moutarde','mustard'],
  'Violet':['violet','violette','purple','mauve','lilas','lavande','lavender','prune','plum'],
  'Marron':['marron','brown','brun','brune','tan','camel','chocolat','chocolate','caramel','cognac','café','cafe','taupe','noisette'],
  'Beige':['beige','sable','sand','nude','champagne','vanille','vanilla','crème','off-white','off white']
};

/* ── Multi-word color list (checked before single tokens) ── */
var MULTIWORD_COLORS=['bleu marine','bleu foncé','bleu fonce','dark blue','vert olive','vert kaki','army green','olive green','off white','off-white','vert clair','bleu clair','gris clair','gris foncé'];

/* ── Brand alias shortcuts ── */
var BRAND_ALIASES={'lv':'louis vuitton','si':'stone island','cp':'cp company','ysl':'yves saint laurent','ald':'aimé leon dore','cdg':'comme des garçons'};

/* ── Index inversé construit au chargement ── */
var BRAND_INDEX={};/* brandNameLower → catObj */
var BRAND_WORDS={};/* individual words → [catObj] for partial matching */
var PRODUCT_SEARCH_INDEX=[];/* [{p, bn, bnl, tl, types:[], typeConf, primaryColor, colorConf}] */

function buildSearchIndex(){
  BRAND_INDEX={};BRAND_WORDS={};
  var CAT_MAP={};
  CATEGORIES.forEach(function(c){
    var bnl=c.n.toLowerCase();
    BRAND_INDEX[bnl]=c;
    /* Also index individual words for partial brand matching */
    bnl.split(/\s+/).forEach(function(w){
      if(w.length>=3){if(!BRAND_WORDS[w])BRAND_WORDS[w]=[];BRAND_WORDS[w].push(c)}
    });
    CAT_MAP[c.id]=c;
  });

  /* Color normalization map: group sub-variants under main color */
  var COLOR_NORMALIZE={'Bleu clair':'Bleu','Vert clair':'Vert','Vert foncé':'Vert','Gris clair':'Gris','Gris foncé':'Gris','Turquoise':'Bleu','Bordeaux':'Rouge'};

  PRODUCT_SEARCH_INDEX=[];
  PRODUCTS.forEach(function(p){
    var cat=CAT_MAP[p.a];
    var brandName=cat?cat.n:'';
    var tl=(p.t||'').toLowerCase();

    /* ── Primary color from image analysis (cl field) ── */
    var primaryColor=null;var colorConf=0;
    if(p.cl){
      var rawColor=p.cl;
      var normalized=COLOR_NORMALIZE[rawColor]||rawColor;
      primaryColor=normalized;
      /* Confidence: image-derived = 0.8 base (we trust pixel analysis) */
      colorConf=0.8;
    }
    /* Fallback: try title text for color clues (lower confidence) */
    if(!primaryColor){
      var colorKeys=Object.keys(COLOR_DICT);
      for(var ci=0;ci<colorKeys.length;ci++){
        var syns=COLOR_DICT[colorKeys[ci]];
        for(var si=0;si<syns.length;si++){
          if(tl.indexOf(syns[si].toLowerCase())!==-1){
            primaryColor=colorKeys[ci];colorConf=0.6;
            break;
          }
        }
        if(primaryColor)break;
      }
    }

    /* ── Type from category tag (tp field on category) ── */
    var detectedType=null;var typeConf=0;
    if(cat&&cat.tp&&cat.tp!=='Multi'&&cat.tp!=='Jouet'){
      detectedType=cat.tp;typeConf=0.85;/* category-level assignment = high confidence */
    }
    /* Fallback: title-based detection (lower confidence) */
    if(!detectedType){
      var typeKeys=Object.keys(TYPE_DICT);
      for(var ti=0;ti<typeKeys.length;ti++){
        var syns2=TYPE_DICT[typeKeys[ti]];
        for(var si2=0;si2<syns2.length;si2++){
          if(tl.indexOf(syns2[si2].toLowerCase())!==-1){
            detectedType=typeKeys[ti];typeConf=0.65;
            break;
          }
        }
        if(detectedType)break;
      }
    }

    PRODUCT_SEARCH_INDEX.push({
      p:p,bn:brandName,bnl:brandName.toLowerCase(),tl:tl,
      types:detectedType?[detectedType]:[],typeConf:typeConf,
      primaryColor:primaryColor,colorConf:colorConf
    });
  });
}

/* ── Fuzzy matching (Levenshtein-based) ── */
function levenshtein(a,b){
  if(a===b)return 0;if(!a.length)return b.length;if(!b.length)return a.length;
  if(a.length>b.length){var tmp=a;a=b;b=tmp}
  var al=a.length,bl=b.length;
  var row=[];for(var i=0;i<=al;i++)row[i]=i;
  for(var j=1;j<=bl;j++){
    var prev=row[0];row[0]=j;
    for(var i2=1;i2<=al;i2++){
      var val=b[j-1]===a[i2-1]?prev:Math.min(prev+1,row[i2]+1,row[i2-1]+1);
      prev=row[i2];row[i2]=val;
    }
  }
  return row[al];
}
function fuzzyMatch(query,target,threshold){
  if(!threshold)threshold=0.3;
  if(target===query)return 1;
  if(target.indexOf(query)!==-1)return 1;
  if(query.length<=2)return target.indexOf(query)!==-1?1:0;
  if(target.substring(0,query.length)===query)return 0.95;
  var words=target.split(/[\s\-_'/]+/);
  for(var i=0;i<words.length;i++){
    if(words[i]===query)return 1;
    if(words[i].indexOf(query)===0)return 0.9;
    if(words[i].indexOf(query)!==-1)return 0.8;
  }
  if(query.length>=3){
    var dist=levenshtein(query,target.substring(0,Math.max(query.length+2,target.length)));
    var maxDist=Math.floor(query.length*threshold);
    if(dist<=maxDist)return 1-(dist/query.length);
    for(var j=0;j<words.length;j++){
      if(words[j].length>=2){
        var d2=levenshtein(query,words[j]);
        if(d2<=maxDist)return 0.7*(1-(d2/query.length));
      }
    }
  }
  return 0;
}

/* ── Resolve a single token to type/color/brand ── */
function resolveToken(token){
  var result={type:null,color:null,brand:null,raw:token,score:0,conf:0};
  var bestTypeScore=0,bestType=null;
  Object.keys(TYPE_DICT).forEach(function(canonical){
    TYPE_DICT[canonical].forEach(function(syn){
      var s=fuzzyMatch(token,syn.toLowerCase());
      if(s>bestTypeScore){bestTypeScore=s;bestType=canonical}
    });
  });
  var bestColorScore=0,bestColor=null;
  Object.keys(COLOR_DICT).forEach(function(canonical){
    COLOR_DICT[canonical].forEach(function(syn){
      var s=fuzzyMatch(token,syn.toLowerCase());
      if(s>bestColorScore){bestColorScore=s;bestColor=canonical}
    });
  });
  var bestBrandScore=0,bestBrand=null;
  /* Check brand aliases first */
  if(BRAND_ALIASES[token]){
    var aliasTarget=BRAND_ALIASES[token];
    if(BRAND_INDEX[aliasTarget]){bestBrandScore=1;bestBrand=BRAND_INDEX[aliasTarget]}
  }
  if(!bestBrand){
    Object.keys(BRAND_INDEX).forEach(function(bnl){
      var s=fuzzyMatch(token,bnl);
      if(s>bestBrandScore){bestBrandScore=s;bestBrand=BRAND_INDEX[bnl]}
    });
  }
  /* Pick best with minimum threshold 0.6 */
  if(bestTypeScore>=bestColorScore&&bestTypeScore>=bestBrandScore&&bestTypeScore>=CONF_THRESHOLD){
    result.type=bestType;result.score=bestTypeScore;result.conf=bestTypeScore;
  }else if(bestColorScore>=bestTypeScore&&bestColorScore>=bestBrandScore&&bestColorScore>=CONF_THRESHOLD){
    result.color=bestColor;result.score=bestColorScore;result.conf=bestColorScore;
  }else if(bestBrandScore>=CONF_THRESHOLD){
    result.brand=bestBrand;result.score=bestBrandScore;result.conf=bestBrandScore;
  }
  return result;
}

/* ── Multi-word resolution (brands + compound colors like "bleu marine") ── */
function resolveMultiWord(tokens){
  var resolved=[];var skip={};
  for(var i=0;i<tokens.length;i++){
    if(skip[i])continue;
    var found=false;

    /* Try 3-word, then 2-word combinations for brands AND compound colors */
    for(var len=Math.min(3,tokens.length-i);len>=2;len--){
      var combo=tokens.slice(i,i+len).join(' ');

      /* Check compound colors first (e.g. "bleu marine") */
      var comboColor=null,comboColorScore=0;
      Object.keys(COLOR_DICT).forEach(function(canonical){
        COLOR_DICT[canonical].forEach(function(syn){
          if(syn.indexOf(' ')!==-1||syn.indexOf('-')!==-1){
            var s=fuzzyMatch(combo,syn.toLowerCase());
            if(s>comboColorScore){comboColorScore=s;comboColor=canonical}
          }
        });
      });
      if(comboColorScore>=0.8){
        resolved.push({type:null,color:comboColor,brand:null,raw:combo,score:comboColorScore,conf:comboColorScore});
        for(var k=i;k<i+len;k++)skip[k]=true;
        found=true;break;
      }

      /* Check multi-word brands */
      var bestS=0,bestB=null;
      Object.keys(BRAND_INDEX).forEach(function(bnl){
        var s=fuzzyMatch(combo,bnl);
        if(s>bestS){bestS=s;bestB=BRAND_INDEX[bnl]}
      });
      if(bestS>0.6){
        resolved.push({type:null,color:null,brand:bestB,raw:combo,score:bestS,conf:bestS});
        for(var k2=i;k2<i+len;k2++)skip[k2]=true;
        found=true;break;
      }
    }
    if(!found)resolved.push(resolveToken(tokens[i]));
  }
  return resolved;
}

/* ── Main smart search v2 — strict AND filtering + result levels ── */
function smartSearch(query){
  if(!query||!query.trim())return{products:PRODUCTS,brands:CATEGORIES,info:'',level:0};
  var q=query.trim().toLowerCase().replace(/[&']/g,"'");
  /* Expand brand aliases inline */
  Object.keys(BRAND_ALIASES).forEach(function(alias){
    var re=new RegExp('\\b'+alias+'\\b','g');
    q=q.replace(re,BRAND_ALIASES[alias]);
  });
  var tokens=q.split(/\s+/).filter(function(t){return t.length>0});
  if(!tokens.length)return{products:PRODUCTS,brands:CATEGORIES,info:'',level:0};
  var resolved=resolveMultiWord(tokens);

  /* Collect detected structured filters */
  var filterTypes=[],filterColors=[],filterBrands=[],freeTokens=[];
  resolved.forEach(function(r){
    if(r.type&&r.conf>=CONF_THRESHOLD)filterTypes.push(r.type);
    else if(r.color&&r.conf>=CONF_THRESHOLD)filterColors.push(r.color);
    else if(r.brand&&r.conf>=CONF_THRESHOLD)filterBrands.push(r.brand);
    else freeTokens.push(r.raw);
  });

  var totalCriteria=filterTypes.length+filterColors.length+filterBrands.length;
  var hasFree=freeTokens.length>0;

  /* ── Score and classify each product into levels ── */
  var exact=[],partial=[],fallback=[];

  PRODUCT_SEARCH_INDEX.forEach(function(entry){
    var typeMatch=0,brandMatch=0,colorMatch=0,textMatch=0;
    var typePassed=true,brandPassed=true,colorPassed=true;

    /* ── Brand strict check ── */
    filterBrands.forEach(function(b){
      if(entry.p.a===b.id)brandMatch=1;
      else{brandMatch=0;brandPassed=false}
    });

    /* ── Type strict check (with confidence gating) ── */
    filterTypes.forEach(function(t){
      if(entry.types.indexOf(t)!==-1&&entry.typeConf>=CONF_THRESHOLD){
        typeMatch=1;
      }else{
        /* Soft fallback: check title text but lower score */
        var syns=TYPE_DICT[t]||[];var titleHit=false;
        for(var i=0;i<syns.length;i++){
          if(entry.tl.indexOf(syns[i].toLowerCase())!==-1){titleHit=true;break}
        }
        if(titleHit){typeMatch=0.6}
        else if(entry.types.length===0&&entry.typeConf===0){
          /* Product has no detected type (Multi category + no title clue):
             treat as "unknown" rather than hard-fail. Still passes but low score. */
          typeMatch=0.3;typePassed=true;
        }
        else{typeMatch=0;typePassed=false}
      }
    });

    /* ── Color strict check — primaryColor only, confidence gated ── */
    filterColors.forEach(function(c){
      if(entry.primaryColor===c&&entry.colorConf>=CONF_THRESHOLD){
        colorMatch=1;
      }else{
        /* Check if the queried color's parent matches (e.g. "bleu marine" → product has "Bleu") */
        var colorParents={'Bleu marine':'Bleu','Olive':'Vert'};
        var parent=colorParents[c];
        if(parent&&entry.primaryColor===parent&&entry.colorConf>=CONF_THRESHOLD){
          colorMatch=0.7;/* acceptable but not perfect */
        }else{
          /* Soft: title mention only */
          var syns2=COLOR_DICT[c]||[];var titleHit2=false;
          for(var j=0;j<syns2.length;j++){
            if(entry.tl.indexOf(syns2[j].toLowerCase())!==-1){titleHit2=true;break}
          }
          if(titleHit2){colorMatch=0.5}
          else{colorMatch=0;colorPassed=false}
        }
      }
    });

    /* ── Free text matching ── */
    if(hasFree){
      var ftMatched=0;
      freeTokens.forEach(function(ft){
        if(entry.tl.indexOf(ft)!==-1)ftMatched++;
        else if(entry.bnl.indexOf(ft)!==-1)ftMatched++;
        else{
          var fs=fuzzyMatch(ft,entry.tl);
          if(fs>0.5)ftMatched+=fs;
          else{var fb=fuzzyMatch(ft,entry.bnl);if(fb>0.5)ftMatched+=fb}
        }
      });
      textMatch=freeTokens.length>0?ftMatched/freeTokens.length:0;
    }

    /* ── Compute weighted score ── */
    var typeScore=filterTypes.length>0?typeMatch:1;
    var brandScore=filterBrands.length>0?brandMatch:1;
    var colorScore=filterColors.length>0?colorMatch:1;
    var textScore=hasFree?textMatch:1;

    var finalScore=W_TYPE*typeScore+W_BRAND*brandScore+W_COLOR*colorScore+W_TEXT*textScore;

    /* ── Classify into levels based on strict AND ── */
    var allStructuredPass=typePassed&&brandPassed&&colorPassed;
    var structuredMatches=(typePassed?1:0)+(brandPassed?1:0)+(colorPassed?1:0);
    var structuredTotal=(filterTypes.length>0?1:0)+(filterBrands.length>0?1:0)+(filterColors.length>0?1:0);

    if(totalCriteria===0){
      /* Free text only search */
      if(textMatch>0.3){exact.push({entry:entry,score:finalScore,level:1})}
      else if(textMatch>0){fallback.push({entry:entry,score:finalScore,level:3})}
    }else if(allStructuredPass&&(!hasFree||textMatch>0.3)){
      /* LEVEL 1: ALL structured criteria pass + free text matches */
      exact.push({entry:entry,score:finalScore,level:1});
    }else if(structuredTotal>1&&structuredMatches>=structuredTotal-1){
      /* LEVEL 2: N-1 structured criteria pass, BUT missing criterion must have weak signal > 0 */
      var weakOk=true;
      if(filterTypes.length>0&&!typePassed&&typeMatch===0)weakOk=false;
      if(filterBrands.length>0&&!brandPassed&&brandMatch===0)weakOk=false;
      if(filterColors.length>0&&!colorPassed&&colorMatch===0)weakOk=false;
      if(weakOk&&(typeMatch>0||brandMatch>0||colorMatch>0)){
        partial.push({entry:entry,score:finalScore*0.6,level:2});
      }
    }
  });

  /* ── Assemble results with strict priority ── */
  var resultLevel=1;var results;
  if(exact.length>0){
    results=exact;resultLevel=1;
  }else if(partial.length>0){
    results=partial;resultLevel=2;
  }else if(fallback.length>0){
    results=fallback;resultLevel=3;
  }else{
    results=[];resultLevel=0;
  }

  results.sort(function(a,b){return b.score-a.score});
  var products=results.map(function(r){return r.entry.p});

  /* Also filter brands for home view */
  var brandIds={};
  results.forEach(function(r){brandIds[r.entry.p.a]=true});
  filterBrands.forEach(function(b){brandIds[b.id]=true});
  var brands=CATEGORIES.filter(function(c){return brandIds[c.id]});

  /* If only brand filter, return all brand products sorted */
  if(filterBrands.length>0&&filterTypes.length===0&&filterColors.length===0&&freeTokens.length===0){
    brands=filterBrands.map(function(b){return CATEGORIES.find(function(c){return c.id===b.id})}).filter(Boolean);
    products=PRODUCTS.filter(function(p){return filterBrands.some(function(b){return p.a===b.id})});
    resultLevel=1;
  }

  var infoParts=[];
  if(filterTypes.length)infoParts.push('Type: '+filterTypes.join(', '));
  if(filterColors.length)infoParts.push('Couleur: '+filterColors.join(', '));
  if(filterBrands.length)infoParts.push('Marque: '+filterBrands.map(function(b){return b.n}).join(', '));
  if(freeTokens.length)infoParts.push('Texte: '+freeTokens.join(' '));

  var levelLabels={0:'Aucun résultat',1:'Résultats exacts',2:'Résultats partiels',3:'Résultats approchés'};

  return{products:products,brands:brands,info:infoParts.join(' · '),count:products.length,
    filters:{types:filterTypes,colors:filterColors,brands:filterBrands,free:freeTokens},
    level:resultLevel,levelLabel:levelLabels[resultLevel]||''};
}

/* ── Suggestions / Autocomplete ── */
function buildSuggestions(query){
  if(!query||query.length<2)return[];
  var q=query.trim().toLowerCase();
  var suggestions=[];
  /* Brand suggestions */
  CATEGORIES.forEach(function(c){
    var s=fuzzyMatch(q,c.n.toLowerCase());
    if(s>0.4)suggestions.push({label:c.n,type:'Marque',score:s*1.2,count:c.c});
  });
  /* Type suggestions — only show types that have products */
  Object.keys(TYPE_DICT).forEach(function(canonical){
    var syns=TYPE_DICT[canonical];
    var bestS=0;
    syns.forEach(function(syn){var s=fuzzyMatch(q,syn.toLowerCase());if(s>bestS)bestS=s});
    if(bestS>0.4){
      var count=PRODUCT_SEARCH_INDEX.filter(function(e){return e.types.indexOf(canonical)!==-1&&e.typeConf>=CONF_THRESHOLD}).length;
      if(count>0)suggestions.push({label:canonical,type:'Type',score:bestS,count:count});
    }
  });
  /* Color suggestions — only show colors that have products */
  Object.keys(COLOR_DICT).forEach(function(canonical){
    var syns=COLOR_DICT[canonical];
    var bestS=0;
    syns.forEach(function(syn){var s=fuzzyMatch(q,syn.toLowerCase());if(s>bestS)bestS=s});
    if(bestS>0.4){
      var count=PRODUCT_SEARCH_INDEX.filter(function(e){return e.primaryColor===canonical&&e.colorConf>=CONF_THRESHOLD}).length;
      if(count>0)suggestions.push({label:canonical,type:'Couleur',score:bestS,count:count});
    }
  });
  suggestions.sort(function(a,b){return b.score-a.score});
  return suggestions.slice(0,8);
}

var suggestIndex=-1;
function showSuggestions(query){
  var box=document.getElementById('searchSuggest');
  var sugs=buildSuggestions(query);
  if(!sugs.length||!query||query.length<2){box.classList.remove('open');box.innerHTML='';suggestIndex=-1;return}
  var h='';
  sugs.forEach(function(s,i){
    h+='<div class="sug-item" data-idx="'+i+'" onmousedown="pickSuggestion('+i+')">';
    h+='<span class="sug-label">'+escH(s.label)+(s.count?' <span style=\"opacity:.4;font-size:11px\">('+s.count+')</span>':'')+'</span>';
    h+='<span class="sug-type">'+s.type+'</span></div>';
  });
  box.innerHTML=h;box.classList.add('open');suggestIndex=-1;
  window._currentSugs=sugs;
}
function pickSuggestion(idx){
  var sugs=window._currentSugs;if(!sugs||!sugs[idx])return;
  var sug=sugs[idx];
  var input=document.getElementById('searchInput');
  /* Append suggestion to query intelligently */
  input.value=sug.label;
  document.getElementById('searchSuggest').classList.remove('open');
  executeSmartSearch(sug.label);
}
function onSearchKey(e){
  var box=document.getElementById('searchSuggest');
  var items=box.querySelectorAll('.sug-item');
  if(!items.length||!box.classList.contains('open')){
    if(e.key==='Enter'){e.preventDefault();executeSmartSearch(e.target.value)}
    return;
  }
  if(e.key==='ArrowDown'){e.preventDefault();suggestIndex=Math.min(suggestIndex+1,items.length-1);highlightSug(items)}
  else if(e.key==='ArrowUp'){e.preventDefault();suggestIndex=Math.max(suggestIndex-1,-1);highlightSug(items)}
  else if(e.key==='Enter'){e.preventDefault();if(suggestIndex>=0)pickSuggestion(suggestIndex);else executeSmartSearch(e.target.value);box.classList.remove('open')}
  else if(e.key==='Escape'){box.classList.remove('open');suggestIndex=-1}
}
function highlightSug(items){
  for(var i=0;i<items.length;i++)items[i].classList.toggle('active',i===suggestIndex);
}

/* ── Debounced search trigger ── */
function onSmartSearch(q){
  clearTimeout(searchTimer);
  showSuggestions(q);
  searchTimer=setTimeout(function(){executeSmartSearch(q)},300);
}

function executeSmartSearch(q){
  document.getElementById('searchSuggest').classList.remove('open');
  q=(q||'').trim();
  if(!q){
    /* Clear search — restore current view */
    document.getElementById('searchTags').innerHTML='';
    if(CURRENT_VIEW==='home')showHome();
    else if(CURRENT_VIEW==='nouveautes')showNouveautes();
    else if(CURRENT_VIEW==='brand')showBrand(CURRENT_CAT);
    return;
  }
  var result=smartSearch(q);
  /* Show search tags */
  var tagsHtml='';
  if(result.filters){
    result.filters.types.forEach(function(t){tagsHtml+='<span class="search-tag">'+escH(t)+' <span class="tag-x" onclick="removeSearchToken(this,\'type\',\''+escH(t)+'\')">×</span></span>'});
    result.filters.colors.forEach(function(c){tagsHtml+='<span class="search-tag">'+escH(c)+' <span class="tag-x" onclick="removeSearchToken(this,\'color\',\''+escH(c)+'\')">×</span></span>'});
    result.filters.brands.forEach(function(b){tagsHtml+='<span class="search-tag">'+escH(b.n)+' <span class="tag-x" onclick="removeSearchToken(this,\'brand\',\''+escH(b.n)+'\')">×</span></span>'});
  }
  document.getElementById('searchTags').innerHTML=tagsHtml;

  /* Always switch to global search results view */
  CURRENT_VIEW='search';CURRENT_CAT=null;
  setActiveMenu('');
  document.getElementById('hero').style.display='none';
  document.getElementById('brandsGrid').style.display='none';
  document.getElementById('productsSection').style.display='block';
  var countText=result.count+' résultat'+(result.count!==1?'s':'');
  var levelBadge='';
  if(result.level===1)levelBadge='<span style="color:var(--green);font-size:11px;margin-left:8px">● '+escH(result.levelLabel)+'</span>';
  else if(result.level===2)levelBadge='<span style="color:#ffb74d;font-size:11px;margin-left:8px">◐ '+escH(result.levelLabel)+'</span>';
  else if(result.level===3)levelBadge='<span style="color:#ef5350;font-size:11px;margin-left:8px">○ '+escH(result.levelLabel)+'</span>';
  else if(result.level===0)levelBadge='<span style="color:#ef5350;font-size:11px;margin-left:8px">'+escH(result.levelLabel)+'</span>';
  document.getElementById('productsHeader').innerHTML='<button class="back-btn" onclick="clearSearch()">←</button><h2>Recherche</h2><span class="search-results-info">'+countText+(result.info?' — '+escH(result.info):'')+levelBadge+'</span>';
  FILTERED=result.products;
  RENDER_INDEX=0;document.getElementById('productsGrid').innerHTML='';
  renderBatch();closeSidebarMobile();
}

function clearSearch(){
  document.getElementById('searchInput').value='';
  document.getElementById('searchTags').innerHTML='';
  document.getElementById('searchSuggest').classList.remove('open');
  showHome();
}
function removeSearchToken(el,tokenType,val){
  /* Remove this token from input and re-search */
  var input=document.getElementById('searchInput');
  var q=input.value;
  /* Simple: just re-search without this word */
  var re=new RegExp(val.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi');
  input.value=q.replace(re,'').replace(/\s+/g,' ').trim();
  executeSmartSearch(input.value);
}

/* Close suggestions on outside click */
document.addEventListener('click',function(e){
  if(!e.target.closest('.search-wrap'))document.getElementById('searchSuggest').classList.remove('open');
});

function openLightbox(idx){
  var p=FILTERED[idx];if(!p)return;
  var lbImg=p.p?(p.p.indexOf('http')===0?p.p:((p.s)?imgUrl(p.p,p.s,'b'):'')):'';

  document.getElementById('lbImg').src=lbImg;
  var cat=CATEGORIES.find(function(c){return c.id===p.a});
  document.getElementById('lbBrand').textContent=cat?cat.n:'';
  var price=extractPrice(p.t);
  document.getElementById('lbPrice').textContent=price||'';
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeLightbox(e){
  if(e&&e.target!==document.getElementById('lightbox')&&e.target.tagName!=='BUTTON'&&!e.target.closest('.lb-back,.lb-close'))return;
  document.getElementById('lightbox').classList.remove('open');document.body.style.overflow='';
}

function setupKeyboard(){document.addEventListener('keydown',function(e){if(e.key==='Escape')closeLightbox({target:document.getElementById('lightbox')})})}
function toggleSidebar(){document.querySelector('.sidebar').classList.toggle('open');document.querySelector('.overlay').classList.toggle('open')}
function closeSidebarMobile(){document.querySelector('.sidebar').classList.remove('open');document.querySelector('.overlay').classList.remove('open')}
function extractPrice(title){if(!title)return '';var m1=title.match(/^(\d{2,})\s/);if(m1)return m1[1];var m2=title.match(/(\d+)\s*[eE€]\b/);return m2?m2[1]:''}
function escH(s){if(!s)return '';return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}

function setupImageRetry(){
  document.addEventListener('error',function(e){
    if(e.target.tagName!=='IMG')return;var img=e.target;
    var retries=parseInt(img.getAttribute('data-retry')||'0');
    if(retries>=2)return;img.setAttribute('data-retry',retries+1);
    var src=img.src;
    if(src.indexOf('_b.jpg')!==-1){img.src=src.replace('_b.jpg','_z.jpg');return}
    if(src.indexOf('_n.jpg')!==-1){img.src=src.replace('_n.jpg','_q.jpg');return}
    if(src.indexOf('_z.jpg')!==-1){img.src=src.replace('_z.jpg','_n.jpg');return}
    setTimeout(function(){img.src=src+'?r='+retries},1000*retries);
  },true);
}
